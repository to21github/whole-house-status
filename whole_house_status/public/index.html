<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>全屋设备状态</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="page">
      <h1 id="title" class="title">全屋设备状态</h1>

      <section class="stats" aria-label="设备状态统计">
        <article class="stat">
          <p>在线</p>
          <strong id="stat-online">0</strong>
        </article>
        <article class="stat">
          <p>开启</p>
          <strong id="stat-on" class="green">0</strong>
        </article>
        <article class="stat">
          <p>超时/高功率</p>
          <strong id="stat-warning" class="orange">0</strong>
        </article>
        <article class="stat">
          <p>离线/故障</p>
          <strong id="stat-error" class="red">0</strong>
        </article>
      </section>

      <div class="filter-bar">
        <nav id="rooms" class="rooms" aria-label="房间筛选"></nav>
        <div class="filter-controls">
          <button id="room-order" class="room-order" type="button" aria-label="排序房间" title="排序房间">
            <span class="room-order-icon" aria-hidden="true"><i></i><i></i><i></i></span>
          </button>
          <details class="display-menu">
            <summary aria-label="显示" title="显示选项">
              <span class="filter-icon" aria-hidden="true"><i></i><i></i><i></i></span>
            </summary>
            <label class="show-ignored-option">
              <input id="show-ignored" type="checkbox">
              <span class="checkbox-box" aria-hidden="true"></span>
              <span>显示已忽略的实体</span>
            </label>
          </details>
        </div>
      </div>
      <div id="connection" class="connection" hidden></div>
      <hr class="divider">
      <section id="ignored" class="cards" aria-label="已忽略的实体" hidden></section>
      <hr id="ignored-divider" class="divider" hidden>
      <section id="alerts" class="cards alerts" aria-label="异常设备"></section>
      <hr class="divider">
      <section id="devices" class="cards" aria-label="设备列表"></section>
    </main>
  </body>
</html>
