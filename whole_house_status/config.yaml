name: Whole House Status
version: "0.1.10"
slug: whole_house_status
description: 全屋设备状态监控面板
url: https://github.com/to21github/whole-house-status
arch:
  - aarch64
  - amd64
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:home-analytics
panel_title: 全屋设备状态
homeassistant_api: true
options:
  display:
    title: 全屋设备状态
    default_room: 全部
    show_entity_id: true
  entities:
    include_domains:
      - switch
      - light
      - climate
      - binary_sensor
    exclude_entities: []
  rooms:
    overrides: []
    order:
      - 全部
      - 门口
      - 客厅
      - 主卧
      - 次卧
      - 厨房
      - 阳台
      - 儿童房
      - 设备间
  alerts:
    default_on_duration_minutes: 480
    high_power_rules: []
    on_duration_rules: []
schema:
  display:
    title: str
    default_room: str
    show_entity_id: bool
  entities:
    include_domains:
      - str
    exclude_entities:
      - str
  rooms:
    overrides:
      - entity_id: str
        room: str
    order:
      - str
  alerts:
    default_on_duration_minutes: int
    high_power_rules:
      - entity_id: str
        power_sensor: str
        threshold_w: float
        duration_minutes: int
    on_duration_rules:
      - entity_id: str
        duration_minutes: int
